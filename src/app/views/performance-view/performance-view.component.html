<section class="grid h-full min-h-0 min-w-0 overflow-hidden px-2.5 py-3">
    <section class="grid min-h-0 min-w-0 grid-rows-[auto_minmax(0,1fr)] overflow-hidden">
        <div class="mb-3">
            <div>
                <h1>Performance</h1>
                <p>Real-time system performance and resource usage</p>
            </div>
        </div>
        <div class="grid min-h-0 grid-cols-[214px_minmax(0,1fr)] gap-2.5 overflow-hidden max-[1040px]:grid-cols-[168px_minmax(0,1fr)]">
            <mtx-performance-resource-nav [items]="resourceNav" [selectedMetric]="selectedMetric()" (metricSelected)="setSelectedMetric($event)" />
            <div class="min-h-0 overflow-auto pr-1">
                <router-outlet></router-outlet>
                <article
                  class="mt-2.5 rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
                    <h2>Top Resource Consumers</h2>
                    <mtx-mini-consumers [rows]="state.rows()" />
                </article>
            </div>
        </div>
    </section>
</section>
