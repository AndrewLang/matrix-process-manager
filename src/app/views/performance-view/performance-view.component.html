<section class="grid h-full min-h-0 min-w-0 gap-2.5 overflow-hidden px-2.5 py-3" [ngClass]="
    detailsOpen()
      ? 'grid-cols-[minmax(0,1fr)_auto]'
      : 'grid-cols-[minmax(0,1fr)]'
  ">
    <section class="grid min-h-0 min-w-0 grid-rows-[auto_minmax(0,1fr)] overflow-hidden">
        <div class="mb-3">
            <div>
                <h1>Performance</h1>
                <p>Real-time system performance and resource usage</p>
            </div>
        </div>
        <div class="grid min-h-0 grid-cols-[214px_minmax(0,1fr)] gap-2.5 overflow-hidden max-[1040px]:grid-cols-[168px_minmax(0,1fr)]">
            <mtx-performance-resource-nav [items]="resourceNav" [selectedMetric]="selectedMetric()" (metricSelected)="setSelectedMetric($event)" />
            <div class="min-h-0 overflow-auto pr-1">
                <router-outlet></router-outlet>
                <article
                  class="mt-2.5 rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
                    <h2>Top Resource Consumers</h2>
                    <mtx-mini-consumers [rows]="state.rows()" />
                </article>
            </div>
        </div>
    </section>
    @if (detailsOpen()) {
    <aside
      class="min-h-0 w-71.5 overflow-hidden rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-3.25 text-[12px] leading-snug shadow-[inset_0_1px_0_rgba(255,255,255,0.03)] max-[1040px]:w-62.5">
        <div class="mb-3 flex items-center gap-2">
            <h2>Details</h2>
            <button class="ml-auto h-5.5 w-5.5 bg-transparent text-[#9aacba]" type="button" aria-label="Close details" (click)="closeDetails()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <mtx-resource-bars [bars]="state.bars()" />
    </aside>
    }
</section>
