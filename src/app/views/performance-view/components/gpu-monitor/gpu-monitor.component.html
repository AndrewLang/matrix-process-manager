<mtx-resource-detail-monitor [metric]="'gpu'" label="GPU" accent="text-(--cyan)" />
<article
  class="mt-2.5 rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
    <div class="flex items-center justify-between">
        <h2>GPU Engines</h2>
        <span class="text-[11px] text-(--muted)">{{ metricValue("GPU") }}</span>
    </div>
    <div class="mt-3 grid gap-2">
        @for (engine of gpuEngines; track engine; let index = $index) {
        <div>
            <div class="mb-1 flex justify-between text-[11px]">
                <span>{{ engine }}</span><span class="text-(--muted)">{{ latest().toFixed(0) }}%</span>
            </div>
            <svg
              class="h-12 w-full rounded border border-white/6 bg-[linear-gradient(rgba(122,153,181,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(122,153,181,0.08)_1px,transparent_1px)] bg-size-[24px_18px] text-(--cyan)"
              viewBox="0 0 120 64" preserveAspectRatio="none">
                <polyline class="fill-none stroke-current stroke-[1.2px]" [attr.points]="enginePath(index)" />
            </svg>
        </div>
        }
    </div>
</article>
