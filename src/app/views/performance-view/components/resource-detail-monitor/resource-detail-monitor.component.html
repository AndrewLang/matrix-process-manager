<article
  class="min-h-[420px] rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
    <div class="mb-3 flex items-start justify-between gap-3">
        <div>
            <h2>{{ label() }}</h2>
            <p class="mt-1 text-[12px] text-(--muted)">{{ metricDetail() }}</p>
        </div>
        <strong class="text-3xl leading-none" [ngClass]="accent()">{{ metricValue() }}</strong>
    </div>
    <svg
      class="h-76 w-full rounded-[5px] border border-white/6 bg-[linear-gradient(rgba(122,153,181,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(122,153,181,0.08)_1px,transparent_1px)] bg-size-[32px_28px]"
      viewBox="0 0 320 112" preserveAspectRatio="none">
                <polyline class="fill-none stroke-current" [ngClass]="accent()" [attr.stroke-width]="lineWidth()" [attr.points]="chartPath()" />
    </svg>
    <div class="mt-2 flex justify-between text-[11px] text-(--muted)">
        <span>60 seconds</span><span>Now</span>
    </div>
    <div class="mt-4 grid grid-cols-4 gap-2.5 max-[1200px]:grid-cols-2">
        <div class="rounded border border-white/6 bg-white/[0.025] p-2.5">
            <span class="text-(--muted)">Utilization</span>
            <strong class="mt-1 block">{{ metricValue() }}</strong>
        </div>
        <div class="rounded border border-white/6 bg-white/[0.025] p-2.5">
            <span class="text-(--muted)">Current</span>
            <strong class="mt-1 block">{{ latest().toFixed(0) }}%</strong>
        </div>
        <div class="rounded border border-white/6 bg-white/[0.025] p-2.5">
            <span class="text-(--muted)">Detail</span>
            <strong class="mt-1 block truncate">{{ metricDetail() }}</strong>
        </div>
        <div class="rounded border border-white/6 bg-white/[0.025] p-2.5">
            <span class="text-(--muted)">Frequency</span>
            <strong class="mt-1 block capitalize">{{ state.updateFrequency() }}</strong>
        </div>
    </div>
</article>
