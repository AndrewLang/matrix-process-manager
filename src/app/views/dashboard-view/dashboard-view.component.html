<section
  class="grid h-full min-h-0 min-w-0 gap-2.5 overflow-hidden px-2.5 py-3"
  [ngClass]="
    detailsOpen()
      ? 'grid-cols-[minmax(0,1fr)_auto]'
      : 'grid-cols-[minmax(0,1fr)]'
  ">
  <section
    class="grid min-h-0 min-w-0 grid-rows-[144px_minmax(0,1fr)] gap-2.5 max-[1040px]:grid-rows-[296px_minmax(0,1fr)]">
    <div class="grid grid-cols-5 gap-2.75 max-[1040px]:grid-cols-2">
      @for (metric of state.metrics(); track metric.label) {
        <mtx-metric-block [metric]="metric" />
      }
    </div>

    <div
      class="grid min-h-0 gap-2.5"
      [ngClass]="
        detailsOpen()
          ? 'grid-cols-[minmax(0,1fr)_286px] max-[1040px]:grid-cols-[minmax(0,1fr)_250px]'
          : 'grid-cols-[minmax(0,1fr)]'
      ">
      <section
        class="grid min-h-0 min-w-0 grid-rows-[auto_minmax(0,1fr)] overflow-hidden rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
        <div class="flex items-center gap-2.25 border-b border-(--border) p-3">
          <h1>
            Processes <span>({{ state.totalProcesses() }})</span>
          </h1>
          <mtx-search-box
            [hostClass]="filterSearchClass"
            placeholder="Filter processes..."
            [(value)]="processFilter" />
          <div class="relative flex-none" (click)="$event.stopPropagation()">
            <button
              type="button"
              class="inline-flex h-7.5 flex-none items-center justify-center gap-1.75 whitespace-nowrap rounded-[5px] border border-(--border) bg-[rgba(16,31,45,0.86)] px-3 py-0 hover:bg-white/6 max-[1040px]:w-7.5 max-[1040px]:px-0"
              (click)="toggleViewOptions()">
              <i class="bi bi-sliders flex-none"></i
              ><span class="whitespace-nowrap max-[1040px]:hidden"
                >View Options</span
              >
            </button>
            @if (viewOptionsOpen()) {
              <div
                class="absolute right-0 top-9 z-50 grid min-w-41 overflow-hidden rounded-md border border-(--border) bg-[rgba(10,22,33,0.98)] py-1 shadow-[0_12px_28px_rgba(0,0,0,0.32)]">
                <button
                  type="button"
                  class="flex h-8 items-center gap-2 bg-transparent px-3 py-0 text-left text-[#cbd7e2] hover:bg-white/6"
                  (click)="
                    dashboardProcessGrid.expandAllGroups(); closeViewOptions()
                  ">
                  <i class="bi bi-arrows-expand flex-none"></i
                  ><span>Expand all groups</span>
                </button>
                <button
                  type="button"
                  class="flex h-8 items-center gap-2 bg-transparent px-3 py-0 text-left text-[#cbd7e2] hover:bg-white/6"
                  (click)="
                    dashboardProcessGrid.collapseAllGroups(); closeViewOptions()
                  ">
                  <i class="bi bi-arrows-collapse flex-none"></i
                  ><span>Collapse all groups</span>
                </button>
              </div>
            }
          </div>
          <button
            type="button"
            class="inline-flex h-7.5 flex-none items-center justify-center gap-1.75 whitespace-nowrap rounded-[5px] border border-[rgba(255,75,67,0.38)] bg-[rgba(16,31,45,0.86)] px-3 py-0 text-(--red) max-[1040px]:w-7.5 max-[1040px]:px-0"
            disabled>
            <i class="bi bi-slash-circle flex-none"></i
            ><span class="whitespace-nowrap max-[1040px]:hidden"
              >End Process</span
            >
          </button>
        </div>
        <mtx-process-grid
          #dashboardProcessGrid
          [rows]="filteredRows()"
          [selectedProcess]="state.selectedProcess()"
          (processSelected)="selectProcess($event)" />
      </section>
      @if (detailsOpen()) {
        <mtx-details-pane
          [process]="state.selectedRow()"
          [bars]="state.bars()"
          (closeDetails)="closeDetails()" />
      }
    </div>
  </section>
</section>
