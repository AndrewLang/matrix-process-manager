<header class="relative flex h-12 select-none items-center justify-center border-b border-(--border) bg-[rgba(6,14,22,0.82)] py-0 pr-0 pl-3.75"
  data-tauri-drag-region (mousedown)="startWindowDrag($event)" (dblclick)="maximizeOnDoubleClick($event)">
  @if (!isMacOS) {
  <div id="titleName" class="absolute left-2 flex h-full items-center gap-1" data-tauri-drag-region>
    <img class="pointer-events-none h-7 w-7 rounded-[5px] object-cover" src="assets/app-icon.png" alt="" aria-hidden="true" />
    <strong class="pointer-events-none text-[14px] tracking-normal">Prism</strong>
  </div>
  }

  <mtx-search-box [hostClass]="searchClass" [inputClass]="searchInputClass" placeholder="Search processes, PID, publisher..." [shortcut]="searchShortcut" />

  <div class="absolute right-0 flex h-full items-center gap-2.5">
    <div class="flex h-full items-center">
      @for (action of actions; track action.name) {
      <button class="grid h-full w-11.5 place-items-center rounded-none bg-transparent text-[#b8c4cf] hover:bg-white/10" type="button"
        [attr.aria-label]="action.name" [title]="action.description" (click)="action.action()">
        @if (action.image) {
        <img class="h-5 w-5 object-contain" [src]="action.image" alt="" aria-hidden="true" />
        }
        @else if (action.icon) {
        <mtx-icon [name]="action.icon" [ngClass]="action.iconClass ?? ''" />
        }
      </button>
      }
    </div>
    @if (isMacOS) {
    <div class="w-2"></div>
    }
    @else {
    <div class="flex h-full items-center">
      <button class="grid h-full w-11.5 place-items-center rounded-none bg-transparent text-[#c3ccd5] hover:bg-white/10" type="button" aria-label="Minimize"
        title="Minimize" (click)="minimizeWindow.emit()">
        <mtx-icon name="dash" class="text-[13px]" />
      </button>
      <button class="grid h-full w-11.5 place-items-center rounded-none bg-transparent text-[#c3ccd5] hover:bg-white/10" type="button" aria-label="Maximize"
        title="Maximize" (click)="toggleMaximizeWindow.emit()">
        <mtx-icon name="square" class="text-[13px]" />
      </button>
      <button class="grid h-full w-11.5 place-items-center rounded-none bg-transparent text-[#c3ccd5] hover:bg-[#c42b1c] hover:text-white" type="button"
        aria-label="Close" title="Close" (click)="closeWindow.emit()">
        <mtx-icon name="x-lg" class="text-[13px]" />
      </button>
    </div>
    }
  </div>
</header>
