<article class="rounded-md border border-(--border) bg-[linear-gradient(145deg,rgba(18,35,51,0.92),rgba(9,22,34,0.86))] p-3">
    <div class="mb-2 flex items-center justify-between">
        <h2>Top Resource Consumers</h2>
        <span class="text-[11px] text-(--muted)"></span>
    </div>
    <div class="grid grid-cols-[minmax(0,1fr)_48px_72px_70px_70px] gap-2 border-b border-white/6 pb-1.5 text-[11px] text-(--muted)">
        <span>Process</span><span>CPU</span><span>Memory</span><span>Disk</span><span>Network</span>
    </div>
    <div class="mt-2 grid gap-2 text-[12px]">
        @for (row of rows(); track row.pid) {
        <div class="grid grid-cols-[minmax(0,1fr)_48px_72px_70px_70px] gap-2 text-[#aab8c6]">
            <span class="truncate"><i class="bi mr-1.5 text-(--blue)" [ngClass]="row.iconClass"></i>{{ row.name }}</span>
            <strong class="text-(--blue)">{{ row.cpu }}</strong>
            <span class="truncate">{{ row.memory }}</span>
            <span class="truncate">{{ row.disk }}</span>
            <span class="truncate">{{ row.network }}</span>
        </div>
        }
    </div>
</article>
