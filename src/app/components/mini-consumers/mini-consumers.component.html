<div class="mt-3.5 grid gap-2.75">
  @for (row of rows().slice(0, 5); track row.pid) {
    <div
      class="grid grid-cols-[minmax(0,1fr)_48px_70px_70px] gap-2 text-[#aab8c6]">
      <span class="overflow-hidden text-ellipsis whitespace-nowrap"
        ><i class="bi mr-1.5 text-(--blue)" [ngClass]="row.iconClass"></i>
        {{ row.name }}</span
      ><strong class="text-(--blue)">{{ row.cpu }}</strong
      ><span>{{ row.memory }}</span
      ><span>{{ row.disk }}</span>
    </div>
  }
</div>
