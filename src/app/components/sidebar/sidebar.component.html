<aside class="flex h-full min-h-0 flex-col overflow-hidden border-r border-(--border) bg-[rgba(8,19,30,0.72)] px-3 pt-4 pb-3">
  <nav class="flex flex-col gap-1">
    <span class="px-2 pt-0 pb-2 text-[11px] uppercase text-[#7f91a4]">Overview</span>
    @for (item of overviewItems(); track item.label) {
    <button type="button" class="flex h-9 items-center gap-3 rounded-[5px] bg-transparent px-2.5 py-0 text-left text-[14px] text-[#c6d2dd] hover:bg-white/6"
      [ngClass]="
          activeView() === item.id
            ? 'bg-[linear-gradient(90deg,rgba(23,144,255,0.22),rgba(23,144,255,0.08))] text-[#2aa4ff]'
            : ''
        " (click)="viewChange.emit(item.id)">
      <mtx-icon [name]="item.icon" class="grid w-6 place-items-center text-base text-[#1d9bff]" />
      {{ item.label }}
    </button>
    }
  </nav>

  <nav class="mt-5 flex min-h-0 flex-col gap-1 overflow-hidden border-t border-(--border) pt-4">
    <span class="px-2 pt-0 pb-2 text-[11px] uppercase text-[#7f91a4]">Tools</span>
    @for (item of toolItems(); track item.label) {
    <button type="button" class="flex h-9 items-center gap-3 rounded-[5px] bg-transparent px-2.5 py-0 text-left text-[14px] text-[#c6d2dd] hover:bg-white/6"
      [ngClass]="
          !item.nativeTool && activeView() === item.id
            ? 'bg-[linear-gradient(90deg,rgba(23,144,255,0.22),rgba(23,144,255,0.08))] text-[#2aa4ff]'
            : ''
        " (click)="toolSelected.emit(item)">
      <mtx-icon [name]="item.icon" class="grid w-6 place-items-center text-base text-[#1d9bff]" />
      {{ item.label }}
    </button>
    }
  </nav>

  <div id="systemName" class="mt-auto grid flex-none gap-1.5 rounded-md border border-(--border) bg-[rgba(16,32,47,0.82)] px-3 py-3.5 text-[12px]">
    <span class="text-xl text-[#65b8ff]"><mtx-icon name="laptop" /></span>
    <strong>{{ workstationName() }}</strong>
    <span class="text-xs text-(--muted)">Uptime: {{ uptime() }}</span>
  </div>
</aside>
