<main class="grid h-screen w-screen grid-rows-[48px_minmax(0,1fr)_28px] overflow-hidden bg-[rgba(6,14,22,0.96)]">
    <app-titlebar (dragStart)="startDrag($event)" (minimizeWindow)="minimize()" (toggleMaximizeWindow)="toggleMaximize()" (closeWindow)="close()" />

    <div class="grid min-h-0 grid-cols-[164px_minmax(0,1fr)]">
        <app-sidebar [overviewItems]="overviewItems" [toolItems]="toolItems" [activeView]="activeView()" (viewChange)="setView($event)" />
        <app-workarea [activeView]="activeView()" [totalProcesses]="totalProcesses()" [metrics]="metrics" [rows]="rows()" [selectedProcess]="selectedProcess()"
          [bars]="bars" [activeTitle]="activeTitle()" (processSelected)="selectProcess($event)" />
    </div>

    <footer class="flex items-center justify-end gap-[22px] border-t border-[var(--border)] bg-[rgba(7,17,27,0.92)] px-3.5 py-0 text-[#a8b5c2]">
        <span class="mr-auto flex items-center gap-[7px]"><i class="bi bi-check-circle-fill text-[var(--green)]"></i> All systems operational</span>
        <span>Processes: {{ totalProcesses() }}</span>
        <span>CPU: 18%</span>
        <span>Memory: 56%</span>
        <span>Disk: 23%</span>
        <span>Network: 12%</span>
    </footer>
</main>
